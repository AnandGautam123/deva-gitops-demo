apiVersion: apps/v1
kind: Deployment
metadata:
  name: webshop
  namespace: gitops-a
  labels:
    app: webshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webshop
  template:
    metadata:
      labels:
        app: webshop
    spec:
      containers:
        - name: webshop
          image: nginx:1.25
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webshop
  namespace: gitops-a
spec:
  selector:
    app: webshop
  ports:
    - port: 80